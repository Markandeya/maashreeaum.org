<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Maashreeaum — Uttarann Spiritual Foundation</title>
  <meta name="description"
    content="Uttarann is a Spiritual Foundation comprised of Shreejashram and Shree Aum Charitable Trust, guided by Shree Guru Maashree.">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/logo.png">

  <!-- Preconnect to external origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

  <!-- Load Google Fonts asynchronously to avoid render-blocking -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap">
  </noscript>

  <!-- Preload hero poster for faster LCP -->
  <link rel="preload" as="image" href="/hero-poster.jpg" fetchpriority="high">

  <!-- Defer bootstrap-icons CSS to avoid render-blocking -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </noscript>
</head>

<body>
  <app-root></app-root>
</body>

</html>
